name: workflow

on:
    push:
        branches:
            - main
        paths-ignore:
            - 'README.md'

jobs:
    integration:
        name: Continuous Integration
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Lint code
              run: echo "Linting repository"

            - name: Run unit Tests
              run: echo "Running unit tests"

    build-and-push-ecr-image:
        name: Continuous Delivery
        needs: integration
        runs-on: ubuntu-latest
        steps:
            - name: CheckoutCode
              uses: actions/checkout@v4
            
            - name: Install Utilities
              run: |
                sudo apt-get update
                sudo apt-get install -y jq unzip
                        
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v1

            - name: Build, Tag, and Push Docker Image to Amazon ECR
              id: build-image
              env:
                ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
                IMAGE_TAG: latest
              run: |
                 # Build a docker container
                 # push it to ECR repository
                 # To deploy the image to ECS
                  
                  docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
                  docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
                    #   echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
                  echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"


    continuous-Deployment:
      needs: build-and-push-ecr-image
      runs-on: self-hosted
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        # - name: Install AWS CLI
        #   run: |
        #     curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        #     unzip -q awscliv2.zip
        #     sudo ./aws/install --update
        #     aws --version]

        - name: Check AWS CLI
          run: |
            which aws || true
            aws --version || true

        - name: List ECR images
          run: aws ecr list-images --repository-name packetping --region us-east-1

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v2
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

        # Add this new step for ECR login
        - name: Login to Amazon ECR
          id: login-ecr-deployment
          uses: aws-actions/amazon-ecr-login@v1

        - name: Check ECR Images
          run: |
            aws ecr list-images --repository-name ${{ secrets.ECR_REPOSITORY_NAME }} --region ${{ secrets.AWS_REGION }}

        - name: Pull latest image
          run: |
            docker pull ${{ steps.login-ecr-deployment.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest
        # - name: Stop and Remove container if running
        #   run: |
        #     docker ps -q --filter "name=packetping" | grep -q . && docker stop packetping && docker rm -fv packetping

        - name: Run Docker Image to serve users
          run: |
            docker run -d -p 8080:8080 --ipc="host" \
              --name=packetping \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              ${{ steps.login-ecr-deployment.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}:latest
        - name: Clean previous images and containers
          run: |
            docker system prune -f